<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="HaBot banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26A5E4"/>
      <stop offset="100%" stop-color="#D97757"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#26A5E4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#26A5E4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <circle cx="950" cy="160" r="220" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g stroke="#1f2937" stroke-width="1" opacity="0.6">
    <path d="M0 80 H1200"/><path d="M0 160 H1200"/><path d="M0 240 H1200"/>
    <path d="M200 0 V320"/><path d="M400 0 V320"/><path d="M600 0 V320"/>
    <path d="M800 0 V320"/><path d="M1000 0 V320"/>
  </g>

  <!-- pulse rings (eyes always watching) -->
  <g transform="translate(950 160)" fill="none" stroke="url(#accent)" stroke-width="2">
    <circle r="40" opacity="0.9"/>
    <circle r="70" opacity="0.55"/>
    <circle r="110" opacity="0.3"/>
    <circle r="150" opacity="0.15"/>
  </g>

  <!-- bot face -->
  <g transform="translate(950 160)">
    <rect x="-46" y="-38" width="92" height="76" rx="16" fill="#0ea5e9" opacity="0.15" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="-18" cy="-4" r="6" fill="#26A5E4"/>
    <circle cx="18" cy="-4" r="6" fill="#D97757"/>
    <rect x="-16" y="14" width="32" height="4" rx="2" fill="url(#accent)"/>
    <line x1="0" y1="-38" x2="0" y2="-58" stroke="url(#accent)" stroke-width="2"/>
    <circle cx="0" cy="-62" r="5" fill="#D97757"/>
  </g>

  <!-- title -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" fill="#e2e8f0">
    <text x="80" y="140" font-size="86" font-weight="800" letter-spacing="-2">
      Ha<tspan fill="url(#accent)">Bot</tspan>
    </text>
    <text x="84" y="184" font-size="22" font-weight="500" fill="#94a3b8">
      The tireless watchman for the things you keep refreshing.
    </text>

    <!-- chip row -->
    <g font-size="14" font-weight="600">
      <g transform="translate(80 220)">
        <rect width="118" height="32" rx="16" fill="#0b1220" stroke="#26A5E4"/>
        <text x="59" y="21" text-anchor="middle" fill="#26A5E4">⏱  scheduled</text>
      </g>
      <g transform="translate(208 220)">
        <rect width="118" height="32" rx="16" fill="#0b1220" stroke="#a78bfa"/>
        <text x="59" y="21" text-anchor="middle" fill="#a78bfa">🔔  transition-only</text>
      </g>
      <g transform="translate(336 220)">
        <rect width="118" height="32" rx="16" fill="#0b1220" stroke="#34d399"/>
        <text x="59" y="21" text-anchor="middle" fill="#34d399">💾  restart-safe</text>
      </g>
      <g transform="translate(464 220)">
        <rect width="138" height="32" rx="16" fill="#0b1220" stroke="#D97757"/>
        <text x="69" y="21" text-anchor="middle" fill="#D97757">🤖  Claude-extensible</text>
      </g>
    </g>

    <text x="80" y="284" font-size="13" fill="#64748b" font-family="ui-monospace, SFMono-Regular, Menlo">
      while (true) { check(); if (changed) telegram.ping(you); sleep(5m); }
    </text>
  </g>
</svg>
